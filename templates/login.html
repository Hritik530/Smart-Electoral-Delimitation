<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login • SmartDelimit</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="auth-layout">
  <div class="auth-card">
    <h2>Welcome back</h2>
    {% if error %}
      <div class="alert"><strong>Login failed</strong>{{ error }}</div>
    {% endif %}
    <form method="POST">
      <div class="form-group">
        <input type="email" class="form-input" id="email" name="email" placeholder="Email" required>
      </div>
      <div class="form-group">
        <input type="password" class="form-input" id="password" name="password" placeholder="Password" required>
      </div>
      <div class="actions">
        <button type="submit" class="auth-button">Login</button>
      </div>
    </form>
    <p class="auth-footnote">Don't have an account? <a href="{{ url_for('signup') }}">Sign up</a></p>
  </div>
</body>
</html>
