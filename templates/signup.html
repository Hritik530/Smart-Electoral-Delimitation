<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up • SmartDelimit</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="auth-layout">
  <div class="auth-card">
    <h2>Create your SmartDelimit account</h2>
    {% if error %}
      <div class="alert"><strong>Sign up failed</strong>{{ error }}</div>
    {% endif %}
    <form method="POST">
      <div class="form-group">
        <input type="text" class="form-input" id="full_name" name="full_name" placeholder="Full Name" required>
      </div>
      <div class="form-group">
        <input type="email" class="form-input" id="email" name="email" placeholder="Email" required>
      </div>
      <div class="form-group">
        <input type="password" class="form-input" id="password" name="password" placeholder="Password" required>
      </div>
      <div class="form-group">
        <input type="password" class="form-input" id="confirm_password" name="confirm_password" placeholder="Confirm Password" required>
      </div>
      <div class="actions">
        <button type="submit" class="auth-button">Create account</button>
      </div>
    </form>
    <p class="auth-footnote">Already have an account? <a href="{{ url_for('login') }}">Sign in</a></p>
  </div>
</body>
</html>
